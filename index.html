<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <title>ASVote - Secure Engagement Platform</title>

    <meta
      name="description"
      content="Secure, real-time, and transparent digital voting & poll engagement platform built for professional standards."
    />

    <!-- Open Graph (Facebook, WhatsApp, Slack, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://a-svote.vercel.app/" />
    <meta property="og:title" content="ASVote - Secure Engagement Platform" />
    <meta
      property="og:description"
      content="Cast your vote securely in real-time. Join professional polls with fully verified transparency."
    />
    <!-- The preview image: must be an absolute URL (jpg/png), recommended ratio 1200x630 -->
    <meta
      property="og:image"
      content="https://a-svote.vercel.app/og-preview.png"
    />

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://a-svote.vercel.app/" />
    <meta
      property="twitter:title"
      content="ASVote - Secure Engagement Platform"
    />
    <meta
      property="twitter:description"
      content="Cast your vote securely in real-time. Join professional polls with fully verified transparency."
    />
    <meta
      property="twitter:image"
      content="https://a-svote.vercel.app/og-preview.png"
    />
  </head>
